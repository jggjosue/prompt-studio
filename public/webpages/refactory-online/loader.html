<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refactory Online — Cargando demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0b0c10;
        color: #e8eaed;
        overflow-x: hidden;
      }
      #refactory-root {
        display: contents;
      }
      .refactory-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 40vh;
        color: #9aa0ad;
        font-size: 0.95rem;
      }
      .refactory-error {
        max-width: 42rem;
        margin: 2rem auto;
        padding: 1rem 1.25rem;
        border-radius: 0.5rem;
        background: #2a1518;
        border: 1px solid #5c2b32;
        color: #f5c6cb;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="refactory-root">
      <div class="refactory-loading">Cargando componentes…</div>
    </div>
    <script src="/webpages/refactory-online/refactory.js"></script>
  </body>
</html>
