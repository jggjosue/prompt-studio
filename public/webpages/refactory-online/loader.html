<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refactory Online — Cargando demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          sans-serif;
        background: radial-gradient(
            ellipse 120% 80% at 50% -20%,
            rgba(99, 102, 241, 0.18),
            transparent 55%
          ),
          #0b0c10;
        color: #e8eaed;
        overflow-x: hidden;
      }
      #refactory-root {
        display: contents;
      }
      .refactory-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 40vh;
        color: #9aa0ad;
        font-size: 0.95rem;
        gap: 0.75rem;
      }
      .refactory-loading::before {
        content: '';
        width: 1.25rem;
        height: 1.25rem;
        border: 2px solid rgba(154, 160, 173, 0.35);
        border-top-color: #a5b4fc;
        border-radius: 50%;
        animation: refactory-spin 0.75s linear infinite;
      }
      @keyframes refactory-spin {
        to {
          transform: rotate(360deg);
        }
      }
      .refactory-integrating {
        max-width: 40rem;
        margin: 0 auto;
        padding: 3rem 1.5rem 4rem;
        text-align: center;
      }
      .refactory-integrating-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #c4b5fd;
        background: rgba(139, 92, 246, 0.15);
        border: 1px solid rgba(167, 139, 250, 0.35);
        margin-bottom: 1.25rem;
      }
      .refactory-integrating h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.5rem, 4vw, 2rem);
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1.2;
      }
      .refactory-integrating-lead {
        margin: 0 0 0.5rem;
        color: #b8bcc6;
        font-size: 1.05rem;
        line-height: 1.6;
      }
      .refactory-integrating-slug {
        display: inline-block;
        margin-top: 0.25rem;
        padding: 0.15rem 0.5rem;
        border-radius: 0.35rem;
        font-family: ui-monospace, monospace;
        font-size: 0.9em;
        color: #e0e7ff;
        background: rgba(255, 255, 255, 0.06);
      }
      .refactory-integrating-sub {
        margin: 0 0 2rem;
        color: #8b919e;
        font-size: 0.95rem;
        line-height: 1.55;
      }
      .refactory-integrating-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
        margin-bottom: 2.5rem;
      }
      .refactory-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.65rem 1.25rem;
        border-radius: 0.5rem;
        font-size: 0.9rem;
        font-weight: 500;
        text-decoration: none;
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.1s;
      }
      .refactory-btn-primary {
        color: #fff;
        background: #6366f1;
        border: 1px solid #818cf8;
      }
      .refactory-btn-primary:hover {
        background: #4f46e5;
      }
      .refactory-btn-secondary {
        color: #e8eaed;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .refactory-btn-secondary:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .refactory-suggestions-title {
        margin: 0 0 1rem;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #6b7280;
      }
      .refactory-suggestions {
        display: grid;
        gap: 0.65rem;
        text-align: left;
      }
      .refactory-suggestion-link {
        display: block;
        padding: 0.85rem 1rem;
        border-radius: 0.65rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #e8eaed;
        text-decoration: none;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .refactory-suggestion-link:hover {
        background: rgba(255, 255, 255, 0.07);
        border-color: rgba(129, 140, 248, 0.45);
      }
      .refactory-suggestion-link strong {
        display: block;
        font-size: 0.95rem;
        margin-bottom: 0.2rem;
      }
      .refactory-suggestion-link span {
        font-size: 0.8rem;
        color: #9aa0ad;
      }
      .refactory-error-fallback {
        max-width: 42rem;
        margin: 2rem auto;
        padding: 1rem 1.25rem;
        border-radius: 0.5rem;
        background: #2a1518;
        border: 1px solid #5c2b32;
        color: #f5c6cb;
        line-height: 1.5;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div id="refactory-root">
      <div class="refactory-loading">Cargando componentes…</div>
    </div>
    <script src="/webpages/refactory-online/refactory.js"></script>
  </body>
</html>
