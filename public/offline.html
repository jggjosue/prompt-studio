<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Prompt Studio — Sin conexión</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
        background: #0a0a0a;
        color: #fafafa;
        padding: 1.5rem;
        text-align: center;
      }
      main {
        max-width: 28rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.75rem;
      }
      p {
        color: #a1a1aa;
        line-height: 1.6;
        margin: 0 0 1.5rem;
      }
      a,
      button {
        display: inline-block;
        padding: 0.625rem 1.25rem;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        border: none;
      }
      a {
        background: #b08d57;
        color: #0a0a0a;
      }
      button {
        background: transparent;
        color: #fafafa;
        border: 1px solid #3f3f46;
        margin-left: 0.5rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>
        No hay red disponible. Las páginas y recursos que ya visitaste pueden
        seguir disponibles desde la caché local.
      </p>
      <a href="/">Ir al inicio</a>
      <button type="button" onclick="location.reload()">Reintentar</button>
    </main>
  </body>
</html>
